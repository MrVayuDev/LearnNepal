name: Check YouTube RSS

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install fast-xml-parser

      - name: Run fetch script
        run: node .github/scripts/fetch-latest-video.js

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain data/latest-video.json
          echo "changes=$(git status --porcelain data/latest-video.json | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes > 0
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update latest youtube video'
          file_pattern: data/latest-video.json

