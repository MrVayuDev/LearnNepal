    folder: "content/chapters/class-12/computer"
    create: true
    slug: "{{slug}}"
    summary: "Ch {{fields.chapter_number}} — {{title}}"
    sortable_fields: ["chapter_number", "title"]

    fields:
      - label: "Chapter Title"
        name: "title"
        widget: "string"

      - label: "Chapter Number"
        name: "chapter_number"
        widget: "number"
        value_type: "int"
        min: 1
        max: 30

      - label: "Topic Area"
        name: "genre"
        widget: "select"
        options: ["Database", "Networking", "Web Technology", "Programming", "OOP", "SEE Model Questions"]
        default: "Programming"

      - label: "Grade"
        name: "grade"
        widget: "hidden"
        default: "12"

      - label: "Subject"
        name: "subject"
        widget: "hidden"
        default: "computer"

      - label: "Summary"
        name: "summary"
        widget: "text"
        required: false

      - label: "Chapter Content"
        name: "body"
        widget: "markdown"

      - label: "Published"
        name: "published"
