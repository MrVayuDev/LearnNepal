      - label: "Topic Area"
        name: "genre"
        widget: "select"
        options: ["Computer Fundamentals", "Number System", "Logic Gates", "Web Technology", "Programming in C", "MS Office"]
        default: "Programming in C"

      - label: "Grade"
        name: "grade"
        widget: "hidden"
        default: "11"

      - label: "Subject"
        name: "subject"
        widget: "hidden"
