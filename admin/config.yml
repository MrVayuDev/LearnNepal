# ─────────────────────────────────────────────────────────────
# LearnNepal — Decap CMS Configuration
# Manages chapters, syllabus pages, and site settings
# via Netlify's git-gateway + Netlify Identity.
# ─────────────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'content: create {{collection}} — {{slug}}'
    update: 'content: update {{collection}} — {{slug}}'
    delete: 'content: delete {{collection}} — {{slug}}'

# Local development: uncomment line below + run `npx decap-server`
# (requires Node.js installed)
# local_backend: true

# Optional: enable editorial workflow for draft → review → publish
# Uncomment the line below to use it:
# publish_mode: editorial_workflow

# Where uploaded images/media go
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Slug sanitization
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# ─── Collections ──────────────────────────────────────────────

collections:

  # ═══════════════════════════════════════════════════════════
  # CLASS 12 — NEPALI CHAPTERS
  # ═══════════════════════════════════════════════════════════
  - name: "c12-nepali"
    label: "📕 Class 12 — Nepali"
    label_singular: "Nepali Chapter"
    folder: "content/chapters/class-12/nepali"
    create: true
    slug: "{{slug}}"
    summary: "Ch {{fields.chapter_number}} — {{title}}"
    sortable_fields: ["chapter_number", "title"]
    view_groups:
      - label: "Genre"
        field: genre

    fields:
      - label: "Chapter Title"
        name: "title"
        widget: "string"
        hint: "e.g. आमाको सपना"

      - label: "Chapter Number"
        name: "chapter_number"
        widget: "number"
        value_type: "int"
        min: 1
        max: 30

      - label: "Author"
        name: "author"
        widget: "string"
        required: false
        hint: "e.g. लक्ष्मीप्रसाद देवकोटा"

      - label: "Genre"
        name: "genre"
        widget: "select"
        options: ["कविता", "कथा", "निबन्ध", "नाटक", "पत्र", "जीवनी", "एकाङ्की", "व्याकरण"]
        default: "कथा"

      - label: "Grade"
        name: "grade"
        widget: "hidden"
        default: "12"

      - label: "Subject"
        name: "subject"
        widget: "hidden"
        default: "nepali"

      - label: "Summary"
        name: "summary"
        widget: "text"
        required: false
        hint: "Brief summary shown in syllabus card (2-3 sentences)"

      - label: "Chapter Content"
        name: "body"
        widget: "markdown"

      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true

  # ═══════════════════════════════════════════════════════════
  # CLASS 12 — ENGLISH CHAPTERS
  # ═══════════════════════════════════════════════════════════
  - name: "c12-english"
    label: "📗 Class 12 — English"
    label_singular: "English Chapter"
    folder: "content/chapters/class-12/english"
    create: true
    slug: "{{slug}}"
    summary: "Unit {{fields.chapter_number}} — {{title}}"
    sortable_fields: ["chapter_number", "title"]
    view_groups:
      - label: "Genre"
        field: genre

    fields:
      - label: "Chapter Title"
        name: "title"
        widget: "string"
        hint: "e.g. Sharing Tradition"

      - label: "Unit/Chapter Number"
        name: "chapter_number"
        widget: "number"
        value_type: "int"
        min: 1
        max: 30

      - label: "Author"
        name: "author"
        widget: "string"
        required: false

      - label: "Genre"
        name: "genre"
        widget: "select"
        options: ["Short Story", "Poem", "Essay", "One Act Play", "Drama", "Biography", "Letter Writing", "Grammar"]
        default: "Short Story"

      - label: "Grade"
        name: "grade"
        widget: "hidden"
        default: "12"

      - label: "Subject"
        name: "subject"
        widget: "hidden"
        default: "english"

      - label: "Summary"
        name: "summary"
        widget: "text"
        required: false

      - label: "Chapter Content"
        name: "body"
        widget: "markdown"

      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true

  # ═══════════════════════════════════════════════════════════
  # CLASS 12 — COMPUTER SCIENCE CHAPTERS
  # ═══════════════════════════════════════════════════════════
  - name: "c12-computer"
