  # ═══════════════════════════════════════════════════════════
  # SITE SETTINGS (single file)
  # ═══════════════════════════════════════════════════════════
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "data/settings.json"
        fields:
          - label: "Site Name"
            name: "siteName"
            widget: "string"
            default: "LearnNepal"

          - label: "Site Description"
            name: "description"
            widget: "text"
            default: "Premium NEB Class 11 & 12 Notes"

          - label: "Footer Text"
            name: "footerText"
            widget: "text"
            default: "Empowering NEB students with high-quality, structured, and accessible digital notes."

          - label: "Contact Email"
            name: "contactEmail"
            widget: "string"
            default: "hello@learnnepal.com"

          - label: "YouTube Channel URL"
            name: "youtubeUrl"
            widget: "string"
            default: "https://www.youtube.com/@OfficialLearnNepal"

          - label: "Announcement Banner"
            name: "announcement"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Enabled", name: "enabled", widget: "boolean", default: false }
              - { label: "Message", name: "message", widget: "string", required: false }
              - { label: "Link", name: "link", widget: "string", required: false }
