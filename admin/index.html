<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — LearnNepal CMS</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Netlify Identity Widget (required for git-gateway auth) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Brand Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* ── LearnNepal Admin Theme ──────────────────────────────── */
    :root {
      --ln-primary:      #0f2a4a;
      --ln-primary-light:#1a3d64;
      --ln-accent:       #c5a059;
      --ln-accent-hover: #d4b36a;
      --ln-bg:           #f5f3ef;
      --ln-bg-card:      #ffffff;
      --ln-text:         #2c3e50;
      --ln-text-muted:   #6b7c93;
      --ln-border:       #e2ded6;
      --ln-radius:       10px;
      --ln-shadow:       0 4px 24px rgba(15,42,74,0.08);
    }

    /* ── Splash Loader (shows while CMS boots) ──────────────── */
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--ln-bg); }

    #ln-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--ln-primary) 0%, #162f52 50%, #0b1e36 100%);
      transition: opacity .6s ease, visibility .6s ease;
    }
    #ln-splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .splash-logo {
      display: flex; align-items: center; gap: 12px;
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 700; color: #fff;
      margin-bottom: 2rem; letter-spacing: -0.01em;
    }
    .splash-logo span { color: var(--ln-accent); }
    .splash-logo img { height: 48px; width: auto; filter: brightness(0) invert(1); }

    .splash-subtitle {
      font-size: 0.9rem; color: rgba(255,255,255,0.5);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .splash-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--ln-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CMS Theme Overrides ────────────────────────────────── */

    /* Top bar */
    [class*="AppHeader"] {
      background: var(--ln-primary) !important;
      border-bottom: 2px solid var(--ln-accent) !important;
      font-family: 'Inter', sans-serif !important;
    }

    /* Logo area in CMS header */
    [class*="AppHeader"] a:first-child {
      font-family: 'Playfair Display', serif !important;
      font-weight: 700 !important;
      letter-spacing: -0.01em !important;
    }

    /* Main content area */
    [class*="AppMainContainer"] {
      background: var(--ln-bg) !important;
    }

    /* Sidebar collection list */
    [class*="SidebarNavList"] a {
      font-family: 'Inter', sans-serif !important;
      font-weight: 500 !important;
    }

    /* Cards & Entries */
    [class*="ListCard"],
    [class*="EntryListing"] {
      border-radius: var(--ln-radius) !important;
      border: 1px solid var(--ln-border) !important;
      box-shadow: var(--ln-shadow) !important;
      font-family: 'Inter', sans-serif !important;
    }

    /* Buttons */
    [class*="ToolbarButton"],
    [class*="PublishButton"] button,
    button[class*="Button"] {
      border-radius: 8px !important;
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
      transition: all .2s ease !important;
    }

    /* Primary action buttons → gold */
    [class*="ToolbarButton"][class*="primary"],
    [class*="PublishButton"] button {
      background: var(--ln-accent) !important;
      border-color: var(--ln-accent) !important;
      color: var(--ln-primary) !important;
    }
    [class*="ToolbarButton"][class*="primary"]:hover,
    [class*="PublishButton"] button:hover {
      background: var(--ln-accent-hover) !important;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(197,160,89,0.3) !important;
    }

    /* Editor fields */
    [class*="ControlPaneContainer"] input,
    [class*="ControlPaneContainer"] textarea,
    [class*="ControlPaneContainer"] select {
      border-radius: 8px !important;
      border: 1px solid var(--ln-border) !important;
      font-family: 'Inter', sans-serif !important;
      transition: border-color .2s ease, box-shadow .2s ease !important;
    }
    [class*="ControlPaneContainer"] input:focus,
    [class*="ControlPaneContainer"] textarea:focus {
      border-color: var(--ln-accent) !important;
      box-shadow: 0 0 0 3px rgba(197,160,89,0.2) !important;
      outline: none !important;
    }

    /* Markdown editor toolbar */
    [class*="Toolbar"] {
      border-radius: var(--ln-radius) var(--ln-radius) 0 0 !important;
      background: var(--ln-bg) !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--ln-bg); }
    ::-webkit-scrollbar-thumb { background: var(--ln-border); border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ln-accent); }
  </style>
</head>
<body>

  <!-- Branded splash screen while Decap CMS loads -->
  <div id="ln-splash">
    <div class="splash-logo">
      <img src="../assets/images/logo.png" alt="">
      LearnNepal<span>.</span>
    </div>
    <div class="splash-subtitle">Content Management System</div>
    <div class="splash-spinner"></div>
  </div>

  <!-- Decap CMS (v3) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Dismiss splash once CMS UI mounts
    const observer = new MutationObserver(() => {
      const app = document.getElementById('nc-root');
      if (app && app.children.length > 0) {
        document.getElementById('ln-splash').classList.add('hidden');
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Fallback: dismiss after 8s even if mutation isn't caught
    setTimeout(() => {
      const splash = document.getElementById('ln-splash');
      if (splash) splash.classList.add('hidden');
    }, 8000);
  </script>

  <!-- Redirect after Netlify Identity login (required for git-gateway) -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>

</body>
</html>
